# =============================================================================
# Streamlit Cloud secrets テンプレート
# =============================================================================
# このファイルは Git に上げません。
# Streamlit Cloud の管理画面 (Settings → Secrets) に直接貼り付けてください。
#
# 入手元:
#   google_maps_api_key  : あなたが既に持ってる Maps API キー
#   gcp_service_account  : credentials/service_account.json の中身そのまま
#   app_password         : 顧客に渡すパスワード (ご自由に)
# =============================================================================

# Google Maps API キー (Places + Geocoding)
google_maps_api_key = "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXX"

# 簡易パスワード (顧客が URL を踏んだあとに入力するもの。
# 推測されにくい英数字をご自由に。例: "Suumo2026Kousuke" 等)
app_password = "Suumo2026Kousuke"

# Google サービスアカウント (credentials/service_account.json をそのまま貼る)
# private_key の改行は \n のままで OK
[gcp_service_account]
type = "service_account"
project_id = "suumo-tool-xxxxx"
private_key_id = "xxxxxxxxxxxxxxxxxxxxxxxxxx"
private_key = "-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkq...略...VeRq\n-----END PRIVATE KEY-----\n"
client_email = "suumo-tool-xxxxx@suumo-tool-xxxxx.iam.gserviceaccount.com"
client_id = "123456789012345678901"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/suumo-tool-xxxxx%40suumo-tool-xxxxx.iam.gserviceaccount.com"
universe_domain = "googleapis.com"
